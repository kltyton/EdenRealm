name: Build

on:
  push:
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  build:
    name: Gradle Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate data
        run: .\gradlew.bat runData

      - name: Build
        run: .\gradlew.bat build

      - name: Upload jars
        uses: actions/upload-artifact@v7
        with:
          name: eden-realm-jars
          path: build/libs/*.jar
